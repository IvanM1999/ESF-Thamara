<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Blog Informativo | ESF Thamara Rodriguez</title>
    <link rel="stylesheet" href="index.css"></head>

</head>

<body>
  <!-- Barra de menus -->
  <header class="site-header">
    <div class="logo-area">
      <img src="/public/src/logo.jpeg" alt="Logo ESF Thamara Rodriguez">
    </div>
    <nav class="main-nav">
      <a href="../index.html">🏠 Início</a>
      <a href="/blog/index.html">📰 Blog</a>
      <a href="/about.html">ℹ️ Sobre</a>
      <a href="/equipe.html">📞 Contato</a>
    </nav>
  </header>

  <!-- Cabeçalho do blog -->
  <section class="blog-header">
    <div class="wrap">
      <h1>Blog Informativo</h1>
      <p>Conteúdo público, educativo e institucional</p>
    </div>
  </section>

  <!-- Conteúdo principal -->
  <main class="wrap blog-main">
    <section id="posts" aria-label="Artigos publicados">
      <!-- Posts carregados automaticamente -->
    </section>
  </main>

  <!-- Rodapé -->
    <footer>
    <p>© 2026 ESF Thamara Rodriguez. Todos os direitos reservados.</p>
    <a href="https://estado.sc.gov.br/"> Governo de Santa Catarina | </a>
    <a href="https://www.saude.sc.gov.br/"> Secretaria da Saúde </a>
  </footer>

  <script>
  async function carregarBlog() {
    const postsContainer = document.getElementById("posts");
    const index = await fetch("posts.json").then(r => r.json());

    for (const post of index) {
      const html = await fetch(post.file).then(r => r.text());
      const doc = new DOMParser().parseFromString(html, "text/html");
      const titulo = doc.querySelector("h1")?.innerText || post.title;
      const paragrafo = doc.querySelector("p")?.innerText || "";

      const artigo = document.createElement("article");
      artigo.className = "post-preview";
      artigo.innerHTML = `
        <header>
          <span class="category">${post.category}</span>
          <h2>${titulo}</h2>
          <time>${post.date}</time>
        </header>
        <p>${paragrafo.substring(0, 280)}...</p>
        <a href="${post.file}" class="read">Ler artigo completo</a>
      `;
      postsContainer.appendChild(artigo);
    }
  }
  carregarBlog();
  </script>
</body>
</html>
